name: "Project Deploy - AWS"

on:
  # 부모 호출이 트리거
  workflow_call:
    secrets:
      AWS_IAMROLE_ARN:
        required: true
      DEV_AWS_TFVARS:
        required: true
      AZURE_CLIENT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
  # 깃허브 웹 화면에 [수동 배포 시작] 버튼을 만들어줌
  workflow_dispatch:

  push:
    branches: [main]
    paths: ["terraform-AWS/**"]

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.14.7"
  AWS_REGION: "ap-northeast-2"
  # TF_LOG: DEBUG

jobs:
  deploy-aws:
    runs-on: ubuntu-latest
    environment: AWS
    env:
      WORKING_DIR: "terraform-AWS/envs/dev"
    concurrency:
      group: test-deploy-aws
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}
          
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAMROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      

      # - name: Create dev tfvars file from Secrets
      #   run: |
      #     cat << 'EOF' > env.dev.aws.tfvars
      #     ${{ secrets.DEV_AWS_TFVARS }}
      #     EOF

      - run: terraform init -input=false

      - name: Terraform Apply
        run: |
          terraform apply -input=false -auto-approve -json > output.json
      
      # 파싱 및 환경 변수 저장
      - name: Parse Outputs
        run: |
          # 클러스터 이름 추출
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> $GITHUB_ENV
          
          # 민감한 정보는 마스킹 처리 후 환경 변수 저장
          DB_PASS=$(terraform output -raw target_password)
          echo "::add-mask::$DB_PASS"
          echo "DB_PASS=$DB_PASS" >> $GITHUB_ENV

      # 3. 파싱한 값으로 kubeconfig
      - name: Update Kubeconfig
        run: |
          aws eks update-kubeconfig --region ap-northeast-2 --name $CLUSTER_NAME