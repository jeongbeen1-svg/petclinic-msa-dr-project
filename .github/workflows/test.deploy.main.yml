name: "Project Main Pipeline"

# 부모의 배포 버튼 클릭 -> 동시 배포
# 자식의 배포 버튼 클릭 -> 개별 배포

on:
  push:
    branches: [main]
    paths:
      - "terraform-Azure/**"
      - "terraform-AWS/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  call-azure:
    uses: ./.github/workflows/test.deploy.azure.yml
    secrets:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      DEV_AZURE_TFVARS: ${{ secrets.DEV_AZURE_TFVARS }}

  call-aws:
    uses: ./.github/workflows/test.deploy.aws.yml
    secrets:
      AWS_IAMROLE_ARN: ${{ secrets.AWS_IAMROLE_ARN }}
      DEV_AWS_TFVARS: ${{ secrets.DEV_AWS_TFVARS }}