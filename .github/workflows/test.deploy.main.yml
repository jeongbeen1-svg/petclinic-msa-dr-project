name: "Project Main Pipeline"
on:
  push:
    branches: [main]
    paths:
      - "terraform-Azure/**"
      - "terraform-AWS/**"
  
  # 부모의 배포 버튼 클릭 -> 동시 배포
  # 자식의 배포 버튼 클릭 -> 개별 배포
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  call-azure:
    uses: ./.github/workflows/test.deploy.azure.yml
  call-aws:
    # needs: call-azure  # 여기서 의존성 제어
    uses: ./.github/workflows/test.deploy.aws.yml